<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marknest</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="app-loading">
    <div class="operation-progress" id="operationProgress" role="status" aria-live="polite" hidden>
      <span class="operation-progress-bar"></span>
      <span id="operationProgressText"></span>
    </div>
    <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>
    <header class="topbar">
      <a class="brand" href="#" aria-label="Marknest">
        <span class="brand-mark">M</span>
        <strong>Marknest</strong>
      </a>
      <label class="global-search">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35m2.35-5.65a8 8 0 1 1-16 0 8 8 0 0 1 16 0Z"/></svg>
        <input id="searchInput" type="search" data-i18n-placeholder="globalSearchPlaceholder" placeholder="搜索文章与草稿" />
        <kbd>⌘ K</kbd>
      </label>
      <div class="topbar-actions">
        <button class="icon-button" id="toggleSecondarySidebarButton" type="button" data-label-key="toggleSidebar" aria-label="Toggle sidebar" aria-pressed="false" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h10M4 19h16"/></svg>
        </button>
        <button class="icon-button quick-create" id="quickCreateButton" type="button" aria-label="New article">+</button>
        <span class="icon-button disabled-icon" role="img" aria-label="Notifications unavailable" data-i18n-title="notificationsUnavailable" title="通知稍后开放">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg>
        </span>
        <label class="locale-control">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>
          <select id="localeSelect" aria-label="Language"></select>
        </label>
        <div class="auth-panel" id="authPanel"></div>
      </div>
    </header>

    <main class="app-frame">
      <aside class="icon-rail">
        <nav aria-label="Primary">
          <button class="nav-item active" type="button" data-view="reader" data-label-key="navReader" aria-label="Reader">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H11v17H6.5A2.5 2.5 0 0 0 4 22V5.5ZM20 5.5A2.5 2.5 0 0 0 17.5 3H13v17h4.5A2.5 2.5 0 0 1 20 22V5.5Z"/></svg>
            <span data-i18n="navReader">阅读</span>
          </button>
          <button class="nav-item" type="button" data-view="workspace" data-label-key="navWorkspace" aria-label="Workspace">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4l11-11-4-4L4 16v4ZM13.5 6.5l4 4"/></svg>
            <span data-i18n="navWorkspace">工作台</span>
          </button>
          <button class="nav-item" type="button" data-view="stats" data-label-key="navStats" aria-label="Stats">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20V10m7 10V4m7 16v-7"/></svg>
            <span data-i18n="navStats">数据</span>
          </button>
          <button class="nav-item admin-only" type="button" data-view="admin" data-label-key="navAdmin" aria-label="Admin">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="m19.4 15 .1.1 1.5 2.6-2.8 2.8-2.6-1.5-.1.1a8 8 0 0 1-3 .9H9.5a8 8 0 0 1-3-.9l-.1-.1-2.6 1.5L1 17.7l1.5-2.6-.1-.1a8 8 0 0 1-.9-3V9a8 8 0 0 1 .9-3l.1-.1L1 3.3 3.8.5 6.4 2l.1-.1a8 8 0 0 1 3-.9h3a8 8 0 0 1 3 .9l.1.1L18.2.5 21 3.3l-1.5 2.6.1.1a8 8 0 0 1 .9 3v3a8 8 0 0 1-1.1 3Z"/></svg>
            <span data-i18n="navAdmin">管理</span>
          </button>
        </nav>
        <button class="rail-toggle" id="togglePrimaryNavButton" type="button" data-label-key="toggleNav" aria-label="Toggle navigation" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg>
          <span data-i18n="toggleNav">展开导航</span>
        </button>
      </aside>

      <section class="app-content">
        <section class="view active" id="readerView">
          <aside class="document-sidebar">
            <div class="sidebar-heading">
              <div>
                <span class="section-kicker" data-i18n="library">内容库</span>
                <h2 data-i18n="readerTitle">已发布文章</h2>
              </div>
            </div>
            <div class="library-tabs" role="tablist" aria-label="Article filters">
              <button class="active" type="button" role="tab" aria-selected="true" data-tab-scope="reader" data-tab-filter="recent" data-i18n="recent">最近</button>
              <button type="button" role="tab" aria-selected="false" data-tab-scope="reader" data-tab-filter="drafts" data-i18n="drafts">草稿</button>
              <button type="button" role="tab" aria-selected="false" data-tab-scope="reader" data-tab-filter="published" data-i18n="published">已发布</button>
            </div>
            <div class="article-list" id="articleList"></div>
          </aside>
          <article class="article-detail social-article" id="articleDetail">
            <div class="content-skeleton" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
          </article>
        </section>

        <section class="view workspace-view" id="workspaceView">
          <aside class="document-sidebar workspace-library">
            <button class="primary create-button" id="newArticleButton" type="button">
              <span>＋</span><span data-i18n="newArticle">新建文章</span>
            </button>
            <div class="library-tabs" role="tablist" aria-label="Workspace filters">
              <button class="active" type="button" role="tab" aria-selected="true" data-tab-scope="workspace" data-tab-filter="recent" data-i18n="recent">最近</button>
              <button type="button" role="tab" aria-selected="false" data-tab-scope="workspace" data-tab-filter="drafts" data-i18n="drafts">草稿</button>
              <button type="button" role="tab" aria-selected="false" data-tab-scope="workspace" data-tab-filter="published" data-i18n="published">已发布</button>
            </div>
            <div class="workspace-articles" id="workspaceArticles"></div>
          </aside>

          <section class="editor-workspace">
            <div class="document-commandbar">
              <div class="document-heading">
                <input id="titleInput" class="document-title" type="text" data-i18n-placeholder="titlePlaceholder" placeholder="文章标题" />
                <div class="document-status">
                  <span class="status-pill" id="draftStatus">草稿</span>
                  <span id="autosaveStatus">未保存</span>
                </div>
              </div>
              <div class="publish-actions">
                <label class="button file-button">
                  <span data-i18n="uploadMd">上传 .md</span>
                  <input id="markdownFile" type="file" accept=".md,text/markdown,text/plain" />
                </label>
                <button id="saveDraftButton" type="button" data-i18n="saveDraft">保存草稿</button>
                <button id="publishButton" class="primary" type="button" data-i18n="publish">发布</button>
                <button class="icon-button more-button" id="moreActionsButton" type="button" aria-label="More actions" aria-expanded="false" aria-controls="moreActionsMenu">•••</button>
                <div class="more-menu" id="moreActionsMenu" hidden>
                  <button id="unpublishButton" type="button" data-i18n="unpublish">撤回发布</button>
                  <button id="deleteArticleButton" class="danger" type="button" data-i18n="delete">删除文章</button>
                </div>
              </div>
            </div>

            <form class="editor-form" id="articleForm">
              <textarea id="summaryInput" class="summary-input" rows="2" data-i18n-placeholder="summaryPlaceholder" placeholder="添加一段简洁的文章摘要"></textarea>
              <div class="metadata-bar">
                <label><span data-i18n="categoryLabel">分类</span><input id="categoryInput" type="text" data-i18n-placeholder="categoryPlaceholder" placeholder="工程实践" /></label>
                <label><span data-i18n="tagsLabel">标签</span><input id="tagsInput" type="text" placeholder="markdown, writing" /></label>
                <label><span data-i18n="visibilityLabel">可见性</span>
                  <select id="visibilityInput">
                    <option value="public" data-i18n="visibilityPublic">公开</option>
                    <option value="unlisted" data-i18n="visibilityUnlisted">仅链接可见</option>
                    <option value="private" data-i18n="visibilityPrivate">私有</option>
                  </select>
                </label>
                <label><span data-i18n="stylePresetLabel">页面风格</span>
                  <select id="stylePresetInput">
                    <option value="social" data-i18n="styleSocial">现代社交</option>
                    <option value="minimal" data-i18n="styleMinimal">极简阅读</option>
                    <option value="technical" data-i18n="styleTechnical">技术文档</option>
                    <option value="newsletter" data-i18n="styleNewsletter">专栏 Newsletter</option>
                    <option value="cover" data-i18n="styleCover">卡片封面</option>
                  </select>
                </label>
                <label class="cover-field"><span data-i18n="coverLabel">封面图</span><input id="coverInput" type="url" placeholder="https://..." /></label>
              </div>
              <div class="format-toolbar" aria-label="Markdown formatting">
                <button type="button" data-insert="## " title="Heading">H</button>
                <button type="button" data-wrap="**" title="Bold"><strong>B</strong></button>
                <button type="button" data-wrap="_" title="Italic"><em>I</em></button>
                <button type="button" data-insert="[链接](https://)" title="Link">↗</button>
                <button type="button" id="insertImageButton" title="Image">▧</button>
                <button type="button" data-insert="| 列 1 | 列 2 |\n| --- | --- |\n| 内容 | 内容 |\n" title="Table">▦</button>
                <button type="button" data-insert="```js\n\n```\n" title="Code">&lt;/&gt;</button>
                <button type="button" data-insert="- [ ] " title="Task">☑</button>
              </div>
              <label class="markdown-field">
                <span class="sr-only" data-i18n="markdownLabel">Markdown</span>
                <textarea id="markdownInput" class="markdown-editor" spellcheck="false"></textarea>
              </label>
              <footer class="editor-footer">
                <span id="wordCount">0 字</span>
                <span id="readingTime">约 1 分钟阅读</span>
                <span class="saved-indicator">● <span data-i18n="autosaveEnabled">自动保存已开启</span></span>
              </footer>
            </form>
          </section>

          <aside class="preview-column">
            <div class="preview-header">
              <strong data-i18n="livePreview">实时预览</strong>
              <span data-i18n="readerMode">读者视图</span>
            </div>
            <article class="preview-panel social-article">
              <header class="preview-author">
                <span class="avatar">M</span>
                <div><strong id="previewAuthor" data-i18n="previewCreator">Marknest 创作者</strong><span data-i18n="justNow">刚刚</span></div>
                <span class="icon-button static-icon" aria-hidden="true">•••</span>
              </header>
              <h1 id="previewTitle"></h1>
              <p class="preview-summary" id="previewSummary"></p>
              <div class="preview-tags" id="previewTags"></div>
              <div id="previewOutput" class="markdown-body"></div>
              <footer class="engagement-bar">
                <span>◉ <span data-i18n="metricViews">浏览</span></span>
                <span>♡ <span data-i18n="like">点赞</span></span>
                <span>□ <span data-i18n="comments">评论</span></span>
                <span>↗ <span data-i18n="metricShares">分享</span></span>
              </footer>
            </article>
          </aside>

          <section class="asset-drawer" id="assetDrawer" hidden>
            <div>
              <h3 data-i18n="imageAssets">文章图片</h3>
              <p data-i18n="imageAssetsHelp">上传 Markdown 引用的本地图片，系统会自动替换引用路径。</p>
            </div>
            <label class="button primary file-button">
              <span data-i18n="uploadImages">上传图片</span>
              <input id="imageFiles" type="file" accept="image/png,image/jpeg,image/webp,image/gif" multiple />
            </label>
            <div id="uploadWarnings" class="upload-warnings" hidden></div>
            <div id="assetList" class="asset-list"></div>
          </section>
        </section>

        <section class="view simple-view" id="statsView">
          <div class="page-heading"><span class="section-kicker" data-i18n="analytics">Analytics</span><h2 data-i18n="statsTitle">文章数据</h2><p data-i18n="statsSubtitle">追踪内容表现和读者互动。</p></div>
          <div class="stats-grid" id="statsGrid"></div>
        </section>

        <section class="view simple-view" id="adminView">
          <div class="page-heading"><span class="section-kicker" data-i18n="administration">Administration</span><h2 data-i18n="adminTitle">管理后台</h2><p data-i18n="adminSubtitle">管理用户、内容与评论。</p></div>
          <div class="admin-grid" id="adminGrid"></div>
        </section>
      </section>
    </main>

    <script src="/src/i18n.js"></script>
    <script src="/node_modules/markdown-it/dist/markdown-it.min.js"></script>
    <script src="/src/markdown.js"></script>
    <script src="/src/api.js"></script>
    <script src="/src/app.js"></script>
  </body>
</html>
